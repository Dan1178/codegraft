name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (all extras + dev)
        run: pip install -e ".[all,dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        # The single live-API test is opt-in (-m live_anthropic) and excluded here.
        run: pytest -q
